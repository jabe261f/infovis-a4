<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Information Visualization - Zooming and Lenses</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    
    <!-- the lens is simulated with an svg circle --> 
    <svg class="cy" width="10000" height="10000">
      <circle 
        id="lens" 
        class="cy" 
        cx="50" 
        cy="50" 
        r="40" 
        stroke="green" 
        stroke-width="1" 
        fill="none" 
      />
    </svg>
    
    <!-- cytoscape draws the graph in this div -->
    <div class="cy" id="cy"></div>
    <div id="chart-layer"></div>

    <div id="config" class="config">
      <h2>Controls</h2>

      <label for="lens-radius">Lens radius</label>
      <input id="lens-radius" type="range" min="20" max="200" value="40" />
      <span id="lens-radius-value">40</span>px

      <label for="semantic-zoom">
        <input id="semantic-zoom" type="checkbox" checked />
        Enable semantic zoom
      </label>

      <label for="lens-mode">Lens mode</label>
      <select id="lens-mode">
        <option value="star">Star plots</option>
        <option value="edges">Edge highlight</option>
      </select>
    </div>
    
  </body>

  <!-- dependencies -->
  <script src="libs/d3-7.9.0.js"></script>
  <script src="libs/radar-chart.js"></script>
  <script src="libs/radar-chart2.js"></script>
  <script src="libs/cytoscape-3.24.0.js"></script>
  <script src="libs/cola-3.3.8.js"></script>
  <script src="libs/cyto-cola-2.2.3.js"></script>

  <!-- the magic goes in these files! -->
  <script src="style.js" type="module"></script>
  <script src="script.js" type="module"></script>
</html>
